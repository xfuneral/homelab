apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: security
spec:
  interval: 30m
  timeout: 15m
  releaseName: falco

  chart:
    spec:
      chart: falco
      version: "8.0.2"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: security
      interval: 12h

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  values:
    driver:
      kind: modern_ebpf

    falcosidekick:
      enabled: true
      config:
        debug: false

    falco:
      json_output: true
      json_include_output_property: true

    tty: true

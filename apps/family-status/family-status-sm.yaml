apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: family-status
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: family-status
  namespaceSelector:
    matchNames:
      - my-apps
  endpoints:
    - port: http
      path: /metrics
      interval: 10s

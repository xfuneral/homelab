apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uptime-kuma
  template:
    metadata:
      labels:
        app: uptime-kuma
    spec:
      containers:
        - name: uptime-kuma
          image: louislam/uptime-kuma:2
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: UPTIME_KUMA_DISABLE_FRAME_SAMEORIGIN
              value: "true"
          volumeMounts:
            - name: uptime-kuma-data
              mountPath: /app/data
      volumes:
        - name: uptime-kuma-data
          persistentVolumeClaim:
            claimName: uptime-kuma-data

k8s@kubernetes:~/homelab/apps/itworksonmycluster$ cat deploynment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost
  namespace: apps
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  selector:
    matchLabels:
      app: ghost

  template:
    metadata:
      labels:
        app: ghost
    spec:
      containers:
        - name: ghost
          image: ghost:5

          ports:
            - containerPort: 2368

          env:
            - name: NODE_ENV
              value: production

            - name: url
              value: https://itworksonmycluster.com

            - name: database__client
              value: mysql

            - name: database__connection__host
              value: mysql

            - name: database__connection__user
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER

            - name: database__connection__password
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD

            - name: database__connection__database
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE

          volumeMounts:
            - name: ghost-content
              mountPath: /var/lib/ghost/content

      volumes:
        - name: ghost-content
          persistentVolumeClaim:
            claimName: ghost-data

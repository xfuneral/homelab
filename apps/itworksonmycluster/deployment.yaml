apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost
  namespace: apps
spec:
  replicas: 1

  selector:
    matchLabels:
      app: ghost

  template:
    metadata:
      labels:
        app: ghost
    spec:
      containers:
        - name: ghost
          image: ghost:5
          ports:
            - containerPort: 2368

          env:
            - name: NODE_ENV
              value: production

            - name: url
              value: https://itworksonmycluster.com

            - name: database__client
              value: sqlite3

            - name: database__connection__filename
              value: /var/lib/ghost/content/data/ghost.db

          volumeMounts:
            - name: ghost-content
              mountPath: /var/lib/ghost/content

      volumes:
        - name: ghost-content
          persistentVolumeClaim:
            claimName: ghost-data

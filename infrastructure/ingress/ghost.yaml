apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ghost
  namespace: apps
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: ghost.itworksonmycluster.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ghost
                port:
                  number: 80

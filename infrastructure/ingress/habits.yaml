apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: beaverhabits
  namespace: personal
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: habits.itworksonmycluster.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: beaverhabits
                port:
                  number: 80
